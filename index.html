<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberShop - Gestión de Citas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <h1><span>💈</span> BARBERSHOP</h1>
                <p>INTERNAL MANAGEMENT & SCHEDULING</p>
            </div>
            <div class="status-badge">
                <span class="pulse-dot"></span> Sistema Online
            </div>
        </div>
    </header>

    <main class="dashboard-layout">
        
        <div class="forms-column">
            
            <section class="card animate-fade-in">
                <h3 class="card-title">👤 Registrar Cliente</h3>
                <form id="form-usuario" class="barber-form">
                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="reg-nombre" required placeholder="Ej. Juan Pérez">
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="text" id="reg-telefono" placeholder="Ej. 3123456789">
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="reg-email" required placeholder="Ej. juan@correo.com">
                    </div>
                    <button type="submit" class="btn btn-secondary">Guardar Registro</button>
                </form>
            </section>

            <section class="card animate-fade-in">
                <h2 class="card-title">📅 Agendar Cita</h2>
                
                <div id="alerta" class="hidden alert"></div>

                <form id="form-cita" class="barber-form">
                    <div class="form-group">
                        <label>Seleccionar Cliente</label>
                        <select id="select-usuario" required>
                            <option value="">Cargando clientes...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Asignar Barbero</label>
                        <select id="select-prestador" required>
                            <option value="">Cargando barberos...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Servicio Requerido</label>
                        <select id="select-servicio" required>
                            <option value="">Cargando servicios...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Fecha y Hora</label>
                        <input type="datetime-local" id="input-fecha" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Confirmar Reserva</button>
                </form>
            </section>
        </div>

        <section class="table-column card animate-fade-in">
            <h2 class="card-title">📋 Listado de Citas Activas</h2>

            <div class="table-responsive">
                <table class="barber-table">
                    <thead>
                        <tr>
                            <th>Ref. ID</th>
                            <th>Cliente</th>
                            <th>Barbero</th>
                            <th>Servicio</th>
                            <th>Fecha / Hora</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-citas-body">
                        <tr>
                            <td colspan="6" class="table-loading">
                                Sincronizando con MariaDB...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>

<div id="custom-confirm-modal" class="modal-overlay hidden">
    <div class="modal-card">
        <div class="modal-icon">⚠️</div>
        <h3 class="modal-title-text">Confirmar Acción</h3>
        <p id="custom-modal-message" class="modal-message-text">¿Estás seguro de que deseas realizar esta acción?</p>
        <div class="modal-actions">
            <button id="btn-modal-cancel" class="btn-modal btn-modal-dismiss">Volver</button>
            <button id="btn-modal-confirm" class="btn-modal btn-modal-proceed">Confirmar</button>
        </div>
    </div>
</div>
